name: Familiar
options:
  bundleIdPrefix: com.eshret
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Familiar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: Familiar
        CFBundleDisplayName: Familiar
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSAppleEventsUsageDescription: "Familiar управляет вкладками Safari, чтобы окно не закрывалось при закрытии последней вкладки."
        NSHumanReadableCopyright: ""
    entitlements:
      path: Sources/Familiar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eshret.Familiar
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
